name: Run Lyuba Bot 24/7 (OpenClaw)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

concurrency:
  group: lyuba-bot-single
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345

    steps:
      - name: Cancel conflicting runs and wait
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Checking for other running bot instances ==="
          CURRENT_RUN=${{ github.run_id }}
          REPO=${{ github.repository }}
          for status in in_progress queued; do
            RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs?status=$status&per_page=10" \
              | python3 -c '
          import sys, json
          try:
              d = json.load(sys.stdin)
              for r in d.get("workflow_runs", []):
                  if r["id"] != int(sys.argv[1]):
                      print(r["id"])
          except: pass
          ' "$CURRENT_RUN")
            for run_id in $RUNS; do
              echo "Cancelling $status run: $run_id"
              curl -s -X POST -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$run_id/cancel" || true
            done
          done
          echo "Waiting 60s for old bot instances to fully stop..."
          sleep 60
          echo "=== Ready to start ==="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js (for OpenClaw)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OpenClaw
        run: |
          npm install -g openclaw@latest
          openclaw --version

      - name: Clean Python cache
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true

      - name: Create data directory
        run: mkdir -p data

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/luba.db
          key: lyuba-bot-db-v1
          restore-keys: |
            lyuba-bot-db-

      - name: Generate OpenClaw config (dry check)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
        run: |
          python3 scripts/gen_openclaw_config.py --out /tmp/oc-preview.json
          echo "=== Active providers preview ==="
          cat /tmp/oc-preview.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('providers:', list(d['models']['providers'].keys())); print('primary:', d['agents']['defaults']['model']['primary'])"

      - name: Run Lyuba Bot (OpenClaw) with unlimited auto-restart
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_ID: ${{ secrets.BOT_ID }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          GH_PAT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          OPENCLAW_PORT: "18789"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          DB_PATH: data/luba.db
          LOG_LEVEL: INFO
        run: |
          set +e
          echo "=== Starting Lyuba Bot (OpenClaw) ==="
          RETRY=0
          LAST_START=0
          while true; do
            RETRY=$((RETRY+1))
            echo "--- Attempt $RETRY (started $(date -u +%H:%M:%SZ)) ---"
            NOW=$(date +%s)
            if [ $((NOW - LAST_START)) -gt 600 ]; then RETRY=1; fi
            LAST_START=$NOW
            python3 -m bot.main
            EXIT_CODE=$?
            echo "Bot exited with code $EXIT_CODE (attempt $RETRY) at $(date -u +%H:%M:%SZ)"
            if [ $EXIT_CODE -eq 0 ]; then sleep 5
            elif [ $RETRY -le 3 ]; then sleep 10
            elif [ $RETRY -le 6 ]; then sleep 15
            else sleep 30; fi
          done

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/luba.db
          key: lyuba-bot-db-v1-${{ github.run_id }}

      - name: Save database to git
        if: always()
        run: |
          if [ -f data/luba.db ]; then
            git config user.name "Lyuba Bot"
            git config user.email "lyuba-bot@users.noreply.github.com"
            git fetch origin main || true
            git add -f data/luba.db || true
            git diff --staged --quiet || git commit -m "db: update $(date +%Y-%m-%d_%H:%M)" || true
            git push origin HEAD:main --force-with-lease 2>&1 || git push origin HEAD:main 2>&1 || true
          fi

      - name: Re-dispatch workflow for 24/7
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Re-dispatching workflow for 24/7 ==="
          REPO=${{ github.repository }}
          sleep 10
          SUCCESS=0
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/bot.yml/dispatches" \
              -d '{"ref":"main"}')
            if [ "$HTTP_CODE" = "204" ]; then
              echo "✅ Workflow re-dispatched successfully (attempt $i)"
              SUCCESS=1
              break
            fi
            echo "❌ Re-dispatch attempt $i failed (HTTP $HTTP_CODE), retrying in 15s..."
            sleep 15
          done
          if [ $SUCCESS -eq 0 ]; then
            echo "⚠️ All re-dispatch attempts failed. Relying on cron schedule (every 2h) as fallback."
          fi

      - name: Cleanup
        if: always()
        run: echo "=== Bot session ended ==="
