name: Lyuba Bot v2.0 — HF PRIMARY + POLLINATIONS BACKUP

# ══════════════════════════════════════════════════════════════════════════════
# Lyuba (@asluba_bot) v2.0 — максимально производительная версия.
#
# АРХИТЕКТУРА:
#   - НЕТ локальной модели (убраны segfault'ы, таймауты, 15с задержки)
#   - Primary: HuggingFace Qwen2.5-7B-Instruct (0.8с, стабильно)
#   - Backup: Pollinations free (no auth, всегда доступен)
#   - Singleton httpx с connection pooling (keep-alive)
#   - Circuit breaker для каждого провайдера
#   - Старт за ~30с (вместо 3-5 мин на компиляцию llama-cpp-python)
#
# СЕКРЕТЫ (Settings → Secrets and variables → Actions):
#   BOT_TOKEN     (обязательно) — токен @asluba_bot
#   OWNER_ID      (обязательно) — Telegram ID владельца
#   GH_PAT_TOKEN  (обязательно) — GitHub PAT для self-dispatch
#   HF_TOKEN      (обязательно) — HuggingFace токен для Qwen2.5-7B
#   POLLINATIONS_API_KEY (опц.) — для лучшего rate-limit у Pollinations
#
# Schedule (UTC, Moscow = UTC+3): every 5 hours
# ══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 0 * * *'      # 03:00 Moscow
    - cron: '0 5 * * *'      # 08:00 Moscow
    - cron: '0 10 * * *'     # 13:00 Moscow
    - cron: '0 15 * * *'     # 18:00 Moscow
    - cron: '0 20 * * *'     # 23:00 Moscow
  workflow_dispatch:

concurrency:
  group: lyuba-bot-single
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345  # ~5h45m

    steps:
      - name: Cancel conflicting runs and wait
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          echo "=== Checking for other running bot instances ==="
          CURRENT_RUN=${{ github.run_id }}
          REPO=${{ github.repository }}
          for status in in_progress queued; do
            RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs?status=$status&per_page=10" \
              | python3 -c '
          import sys, json
          try:
              d = json.load(sys.stdin)
              for r in d.get("workflow_runs", []):
                  if r["id"] != int(sys.argv[1]):
                      print(r["id"])
          except: pass
          ' "$CURRENT_RUN")
            for run_id in $RUNS; do
              echo "Cancelling $status run: $run_id"
              curl -s -X POST -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$run_id/cancel" || true
            done
          done
          echo "Waiting 60s for old bot instances to fully stop..."
          sleep 60
          echo "=== Ready to start ==="

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "=== Dependencies installed (no llama-cpp compilation needed) ==="

      - name: Clean Python cache
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          echo "Python cache cleaned"

      - name: Create data directory
        run: mkdir -p data

      - name: Download partner data
        run: |
          mkdir -p data
          HTTP_CODE=$(curl -sL -o /tmp/partners_check.json -w "%{http_code}" "https://sochiautoparts.ru/partners.json")
          if [ "$HTTP_CODE" = "200" ]; then
            if python3 -c "import json; json.load(open('/tmp/partners_check.json'))" 2>/dev/null; then
              cp /tmp/partners_check.json data/partners.json
              echo "Partner data downloaded successfully"
            else
              echo "WARNING: Downloaded file is not valid JSON, skipping"
            fi
          else
            echo "Failed to download partner data (HTTP $HTTP_CODE)"
          fi

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: luba.db
          key: lyuba-bot-db-v2
          restore-keys: |
            lyuba-bot-db-

      - name: Ensure .gitignore allows database
        run: |
          if [ -f .gitignore ]; then
            sed -i '/luba\.db/d' .gitignore
          fi

      - name: Run Lyuba Bot v2.1
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_USERNAME: "@asluba_bot"
          BOT_ID: "8614302697"
          OWNER_ID: ${{ secrets.OWNER_ID }}
          # ── AI Providers (free tiers) — auto-enabled when secret is set ──
          # Groq — Llama 3.3 70B, fastest (~0.4s), free 30 req/min
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Google Gemini — gemini-2.0-flash, free 15 req/min
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Pollinations — GPT-OSS 20B, free, NO AUTH (always available)
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
          # OpenRouter — free models (Llama 3.3 70B)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # HuggingFace — Qwen2.5-7B (often 402 depleted on free tier)
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Cloudflare Workers AI — Mistral 3.1, 10K req/day free
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          CF_ACCOUNT_ID_2: ${{ secrets.CF_ACCOUNT_ID_2 }}
          CF_API_TOKEN_2: ${{ secrets.CF_API_TOKEN_2 }}
          # GitHub PAT for self-dispatch
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GH_REPO: sochiautoparts/luba
          # Database
          DB_PATH: luba.db
          ADMITAD_ADS_FILE: data/partners.json
          PARTNERS_URL: "https://sochiautoparts.ru/partners.json"
          # Group activity — VERY ACTIVE, safe_send handles RetryAfter
          GROUP_PROACTIVE_PROB: "0.60"
          GROUP_MAX_PER_MINUTE: "15"
          GROUP_MEMORY_SIZE: "30"
          LOG_LEVEL: INFO
        run: |
          set +e  # disable exit-on-error so retry loop survives any crash
          echo "=== Starting Lyuba Bot v2.1 ==="
          echo "MULTI-PROVIDER: Groq → Gemini → Pollinations → OpenRouter → HF → Cloudflare"
          echo "Auto-detect: only providers with API keys are active"
          echo "Pollinations always available (free, no auth)"
          echo "=== Launching with UNLIMITED auto-restart ==="
          RETRY=0
          LAST_START=0
          while true; do
            RETRY=$((RETRY+1))
            echo "--- Attempt $RETRY (started $(date -u +%H:%M:%SZ)) ---"
            NOW=$(date +%s)
            if [ $((NOW - LAST_START)) -gt 600 ]; then
              RETRY=1
            fi
            LAST_START=$NOW
            python3 -m bot.main
            EXIT_CODE=$?
            echo "Bot exited with code $EXIT_CODE (attempt $RETRY) at $(date -u +%H:%M:%SZ)"
            if [ $EXIT_CODE -eq 0 ]; then
              sleep 5
            elif [ $RETRY -le 3 ]; then
              sleep 10
            elif [ $RETRY -le 6 ]; then
              sleep 15
            else
              sleep 30
            fi
          done

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: luba.db
          key: lyuba-bot-db-v2-${{ github.run_id }}

      - name: Save database to git
        if: always()
        run: |
          if [ -f luba.db ]; then
            git config user.name "Lyuba Bot"
            git config user.email "lyuba-bot@users.noreply.github.com"
            git add -f luba.db || true
            git diff --staged --quiet || git commit -m "db: update $(date +%Y-%m-%d_%H:%M)" || true
            git add -A || true
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git push || true
          fi

      - name: Re-dispatch workflow for 24/7
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          echo "=== Re-dispatching workflow for 24/7 ==="
          REPO=${{ github.repository }}
          sleep 10
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/bot.yml/dispatches" \
              -d '{"ref":"main"}')
            if [ "$HTTP_CODE" = "204" ]; then
              echo "Workflow re-dispatched successfully (attempt $i)"
              break
            fi
            echo "Re-dispatch attempt $i failed (HTTP $HTTP_CODE), retrying in 10s..."
            sleep 10
          done

      - name: Cleanup
        if: always()
        run: echo "=== Bot session ended ==="
